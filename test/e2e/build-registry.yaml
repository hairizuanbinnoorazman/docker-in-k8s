apiVersion: apps/v1
kind: Deployment
metadata:
  name: dockube-build-registry-tls
  namespace: dockube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dockube-build-registry-tls
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dockube-build-registry-tls
    spec:
      automountServiceAccountToken: false
      containers:
        - name: registry
          image: registry:2.8
          env:
            - name: REGISTRY_HTTP_ADDR
              value: :5000
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
            - name: REGISTRY_AUTH
              value: htpasswd
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: dockube-build-test
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: /auth/htpasswd
          ports:
            - name: registry
              containerPort: 5000
          readinessProbe:
            tcpSocket:
              port: registry
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tls
              mountPath: /certs
              readOnly: true
            - name: auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: dockube-build-registry-server-tls
        - name: auth
          secret:
            secretName: dockube-build-registry-server-auth
---
apiVersion: v1
kind: Service
metadata:
  name: dockube-build-registry-tls
  namespace: dockube-system
spec:
  selector:
    app.kubernetes.io/name: dockube-build-registry-tls
  ports:
    - name: registry
      port: 5443
      targetPort: registry
