apiVersion: v1
kind: Namespace
metadata:
  name: dockube-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: dockube-workloads
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dockube-controller
  namespace: dockube-system
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dockube-controller
  namespace: dockube-workloads
rules:
  - apiGroups: ["dockube.io"]
    resources: ["dockercontainers", "dockercontainers/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dockube-controller
  namespace: dockube-workloads
subjects:
  - kind: ServiceAccount
    name: dockube-controller
    namespace: dockube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dockube-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dockube-controller
  namespace: dockube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dockube-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dockube-controller
    spec:
      serviceAccountName: dockube-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: dockube-controller:dev
          imagePullPolicy: Never
          args:
            - --namespace=dockube-workloads
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
