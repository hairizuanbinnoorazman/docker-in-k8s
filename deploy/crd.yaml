apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dockercontainers.dockube.io
spec:
  group: dockube.io
  scope: Namespaced
  names:
    plural: dockercontainers
    singular: dockercontainer
    kind: DockerContainer
    shortNames:
      - dc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: State
          type: string
          jsonPath: .status.phase
        - name: Pod
          type: string
          jsonPath: .status.currentPodName
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  minLength: 1
                command:
                  type: array
                  items:
                    type: string
                args:
                  type: array
                  items:
                    type: string
                desiredState:
                  type: string
                  default: Running
                  enum:
                    - Running
                    - Stopped
                stdin:
                  type: boolean
                  default: false
                tty:
                  type: boolean
                  default: false
                env:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                  items:
                    type: object
                workingDir:
                  type: string
                ports:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                  items:
                    type: object
                mounts:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                  items:
                    type: object
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                readiness:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                liveness:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                startup:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                labels:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
